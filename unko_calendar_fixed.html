
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
#app { font-family: 'Zen Maru Gothic', sans-serif; background: var(--color-background-tertiary); min-height: 600px; max-width: 420px; margin: 0 auto; padding: 16px; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; margin-bottom: 12px; }
.app-icon { width: 44px; height: 44px; border-radius: 12px; background: #f5f0e8; border: 0.5px solid #d4c9b0; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.month-nav { display: flex; align-items: center; gap: 12px; }
.nav-btn { width: 32px; height: 32px; border-radius: 50%; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--color-text-secondary); transition: background 0.15s; }
.nav-btn:hover { background: var(--color-background-secondary); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.month-label { font-size: 16px; font-weight: 700; color: var(--color-text-primary); min-width: 90px; text-align: center; }
.calendar-card { background: var(--color-background-primary); border-radius: 20px; border: 0.5px solid var(--color-border-tertiary); padding: 16px; margin-bottom: 12px; }
.weekday-row { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 6px; }
.weekday { text-align: center; font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); padding: 4px 0; }
.weekday:first-child { color: #e05a5a; }
.weekday:last-child { color: #5a88e0; }
.days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.day-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; transition: background 0.12s, transform 0.1s; user-select: none; }
.day-cell:not(.empty):not(.future):hover { background: var(--color-background-secondary); }
.day-cell:not(.empty):not(.future):active { transform: scale(0.92); }
.day-cell.empty, .day-cell.future { cursor: default; }
.day-cell.future { opacity: 0.35; }
.day-num { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); line-height: 1; margin-bottom: 1px; }
.day-cell.sun .day-num { color: #e05a5a; }
.day-cell.sat .day-num { color: #5a88e0; }
.day-cell.today .day-num { color: #b97a3a !important; font-weight: 700; }
.today-dot { width: 4px; height: 4px; border-radius: 50%; background: #b97a3a; margin-top: 1px; }
.stamp { font-size: 20px; line-height: 1; animation: pop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes pop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.summary-card { background: var(--color-background-primary); border-radius: 16px; border: 0.5px solid var(--color-border-tertiary); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
.summary-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 2px; }
.summary-count { font-size: 26px; font-weight: 700; color: var(--color-text-primary); }
.streak-badge { background: #fdf3e7; border: 0.5px solid #e8d4b0; border-radius: 20px; padding: 6px 14px; font-size: 13px; color: #a06830; font-weight: 500; }
</style>

<div id="app">
  <h2 style="position:absolute;left:-9999px">うんこカレンダー</h2>
  <div class="header">
    <div class="app-icon">🪴</div>
    <div class="month-nav">
      <button class="nav-btn" id="prevBtn">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn" id="nextBtn">›</button>
    </div>
    <div style="width:44px"></div>
  </div>
  <div class="calendar-card">
    <div class="weekday-row">
      <div class="weekday">日</div><div class="weekday">月</div><div class="weekday">火</div>
      <div class="weekday">水</div><div class="weekday">木</div><div class="weekday">金</div><div class="weekday">土</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>
  <div class="summary-card">
    <div>
      <div class="summary-label">今月の記録</div>
      <div class="summary-count"><span id="monthCount">0</span> <span style="font-size:16px">回</span></div>
    </div>
    <div><div class="streak-badge" id="streakBadge">🔥 連続 0 日</div></div>
  </div>
</div>

<script>
const today = new Date();
const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
let records = {};
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();
const sixMonthsAgo = new Date(today.getFullYear(), today.getMonth() - 5, 1);

async function loadRecords() {
  try {
    const result = await window.storage.get('unko_records');
    if (result && result.value) records = JSON.parse(result.value);
  } catch(e) { records = {}; }
  render();
}

async function saveRecords() {
  try {
    await window.storage.set('unko_records', JSON.stringify(records));
  } catch(e) {}
}

function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function render() {
  document.getElementById('monthLabel').textContent = `${viewYear}年${viewMonth+1}月`;
  const isMinMonth = viewYear === sixMonthsAgo.getFullYear() && viewMonth === sixMonthsAgo.getMonth();
  const isCurrentMonth = viewYear === today.getFullYear() && viewMonth === today.getMonth();
  document.getElementById('prevBtn').disabled = isMinMonth;
  document.getElementById('nextBtn').disabled = isCurrentMonth;

  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    const e = document.createElement('div');
    e.className = 'day-cell empty';
    grid.appendChild(e);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dk = dateKey(viewYear, viewMonth, d);
    const dow = (firstDay + d - 1) % 7;
    const isToday = dk === todayStr;
    const isFuture = dk > todayStr;
    const cell = document.createElement('div');
    let cls = 'day-cell';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (isToday) cls += ' today';
    if (isFuture) cls += ' future';
    cell.className = cls;

    if (records[dk]) {
      cell.innerHTML = `<div class="stamp">💩</div>`;
    } else if (isToday) {
      cell.innerHTML = `<div class="day-num">${d}</div><div class="today-dot"></div>`;
    } else {
      cell.innerHTML = `<div class="day-num">${d}</div>`;
    }

    if (!isFuture) {
      cell.addEventListener('click', () => {
        if (records[dk]) delete records[dk];
        else records[dk] = true;
        saveRecords();
        render();
      });
    }
    grid.appendChild(cell);
  }

  let count = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    if (records[dateKey(viewYear, viewMonth, d)]) count++;
  }
  document.getElementById('monthCount').textContent = count;

  let streak = 0;
  let cur = new Date(today);
  while (streak < 365) {
    const dk = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
    if (records[dk]) { streak++; cur.setDate(cur.getDate() - 1); }
    else break;
  }
  document.getElementById('streakBadge').textContent = `🔥 連続 ${streak} 日`;
}

document.getElementById('prevBtn').addEventListener('click', () => {
  viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } render();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } render();
});

loadRecords();
</script>
