
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
#app { font-family: 'Zen Maru Gothic', sans-serif; min-height: 580px; max-width: 400px; margin: 0 auto; padding: 16px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.app-icon { width: 44px; height: 44px; border-radius: 12px; background: #f5f0e8; border: 0.5px solid #d4c9b0; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.month-nav { display: flex; align-items: center; gap: 10px; }
.nav-btn { width: 32px; height: 32px; border-radius: 50%; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; font-size: 16px; color: var(--color-text-secondary); display: flex; align-items: center; justify-content: center; }
.nav-btn:disabled { opacity: 0.25; cursor: default; }
.nav-btn:not(:disabled):hover { background: var(--color-background-secondary); }
.month-label { font-size: 15px; font-weight: 700; color: var(--color-text-primary); min-width: 88px; text-align: center; }
.cal { background: var(--color-background-primary); border-radius: 20px; border: 0.5px solid var(--color-border-tertiary); padding: 14px; margin-bottom: 12px; }
.wrow { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 4px; }
.wd { text-align: center; font-size: 11px; color: var(--color-text-tertiary); padding: 3px 0; }
.wd:first-child { color: #d95f5f; }
.wd:last-child { color: #5577cc; }
.dgrid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.dc { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; cursor: pointer; user-select: none; transition: background 0.1s, transform 0.1s; }
.dc.empty, .dc.future { cursor: default; }
.dc.future { opacity: 0.3; }
.dc:not(.empty):not(.future):hover { background: var(--color-background-secondary); }
.dc:not(.empty):not(.future):active { transform: scale(0.88); }
.dn { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); }
.dc.sun .dn { color: #d95f5f; }
.dc.sat .dn { color: #5577cc; }
.dc.today .dn { color: #b07828; font-weight: 700; }
.tdot { width: 4px; height: 4px; border-radius: 50%; background: #b07828; margin-top: 2px; }
.stamp { font-size: 19px; animation: pop .2s cubic-bezier(.34,1.56,.64,1); }
@keyframes pop { from { transform:scale(0); opacity:0; } to { transform:scale(1); opacity:1; } }
.sumcard { background: var(--color-background-primary); border-radius: 16px; border: 0.5px solid var(--color-border-tertiary); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
.slim { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 2px; }
.sbig { font-size: 24px; font-weight: 700; color: var(--color-text-primary); }
.badge { background: #fdf3e7; border: 0.5px solid #e0c99a; border-radius: 20px; padding: 5px 12px; font-size: 12px; color: #9a6520; font-weight: 500; }
</style>

<div id="app">
  <div class="header">
    <div class="app-icon">🪴</div>
    <div class="month-nav">
      <button class="nav-btn" id="prev">‹</button>
      <div class="month-label" id="mlabel"></div>
      <button class="nav-btn" id="next">›</button>
    </div>
    <div style="width:44px"></div>
  </div>
  <div class="cal">
    <div class="wrow">
      <div class="wd">日</div><div class="wd">月</div><div class="wd">火</div>
      <div class="wd">水</div><div class="wd">木</div><div class="wd">金</div><div class="wd">土</div>
    </div>
    <div class="dgrid" id="grid"></div>
  </div>
  <div class="sumcard">
    <div>
      <div class="slim">今月の記録</div>
      <div class="sbig"><span id="cnt">0</span><span style="font-size:14px"> 回</span></div>
    </div>
    <div class="badge" id="streak">🔥 連続 0 日</div>
  </div>
</div>

<script>
const records = {};
const now = new Date();
const todayStr = [now.getFullYear(), String(now.getMonth()+1).padStart(2,'0'), String(now.getDate()).padStart(2,'0')].join('-');
let vy = now.getFullYear(), vm = now.getMonth();
const minDate = new Date(now.getFullYear(), now.getMonth()-5, 1);

function dk(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function render(){
  document.getElementById('mlabel').textContent = `${vy}年${vm+1}月`;
  const atMin = vy===minDate.getFullYear()&&vm===minDate.getMonth();
  const atNow = vy===now.getFullYear()&&vm===now.getMonth();
  document.getElementById('prev').disabled = atMin;
  document.getElementById('next').disabled = atNow;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const fd = new Date(vy,vm,1).getDay();
  const dim = new Date(vy,vm+1,0).getDate();

  for(let i=0;i<fd;i++){
    const e=document.createElement('div'); e.className='dc empty'; grid.appendChild(e);
  }
  for(let d=1;d<=dim;d++){
    const key=dk(vy,vm,d);
    const dow=(fd+d-1)%7;
    const isToday=key===todayStr;
    const isFuture=key>todayStr;
    const cell=document.createElement('div');
    let c='dc';
    if(dow===0)c+=' sun'; if(dow===6)c+=' sat';
    if(isToday)c+=' today'; if(isFuture)c+=' future';
    cell.className=c;
    if(records[key]){
      cell.innerHTML='<div class="stamp">💩</div>';
    } else if(isToday){
      cell.innerHTML=`<div class="dn">${d}</div><div class="tdot"></div>`;
    } else {
      cell.innerHTML=`<div class="dn">${d}</div>`;
    }
    if(!isFuture){
      cell.addEventListener('click',()=>{
        if(records[key]) delete records[key]; else records[key]=true;
        render();
      });
    }
    grid.appendChild(cell);
  }

  let cnt=0;
  for(let d=1;d<=dim;d++) if(records[dk(vy,vm,d)]) cnt++;
  document.getElementById('cnt').textContent=cnt;

  let streak=0, cur=new Date(now);
  for(let i=0;i<400;i++){
    const k=[cur.getFullYear(),String(cur.getMonth()+1).padStart(2,'0'),String(cur.getDate()).padStart(2,'0')].join('-');
    if(records[k]){streak++;cur.setDate(cur.getDate()-1);}else break;
  }
  document.getElementById('streak').textContent=`🔥 連続 ${streak} 日`;
}

document.getElementById('prev').addEventListener('click',()=>{ vm--; if(vm<0){vm=11;vy--;} render(); });
document.getElementById('next').addEventListener('click',()=>{ vm++; if(vm>11){vm=0;vy++;} render(); });
render();
</script>
